<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;width:1280px;height:800px;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#fafafa;color:#1a1a1a;overflow:hidden}
  .top{position:absolute;left:80px;top:40px;font-size:26px;font-weight:700}
  .card{position:absolute;top:140px;width:320px;height:460px;background:#fff;border:1px solid #ececec;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
  .c1{left:80px}.c2{left:480px}.c3{left:880px}
  .thumb{position:absolute;top:160px;width:280px;height:200px;border-radius:8px;background:linear-gradient(135deg,#e3e7ef,#c9d2e3)}
  .t1{left:100px}.t2{left:500px}.t3{left:900px}
  .name{position:absolute;top:380px;font-size:16px;font-weight:600}
  .n1{left:100px}.n2{left:500px}.n3{left:900px}
  .price{position:absolute;top:412px;font-size:18px;font-weight:700;color:#0a7d33}
  .p1{left:100px}.p2{left:500px}.p3{left:900px}
  .cart{position:absolute;top:520px;width:200px;height:44px;border:none;border-radius:8px;background:#ff6a00;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
  .b1{left:100px}.b2{left:500px}.b3{left:900px}
</style></head><body>
  <div class="top">Featured products</div>
  <div class="card c1"></div><div class="card c2"></div><div class="card c3"></div>
  <div class="thumb t1"></div><div class="thumb t2"></div><div class="thumb t3"></div>
  <div class="name n1">Aurora Headphones</div><div class="name n2">Nimbus Keyboard</div><div class="name n3">Vertex Mouse</div>
  <div class="price p1">$129</div><div class="price p2">$89</div><div class="price p3">$59</div>
  <button class="cart b1">Add to cart</button>
  <button class="cart b2">Add to cart</button>
  <button class="cart b3">Add to cart</button>
</body></html>
